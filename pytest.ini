[pytest]
log_cli = true
addopts = -m "not inference and not slow" -s
markers =
    fast: fast behavioral tests, the default tier (everything not marked inference/slow; < ~1s each)
    inference: heavier tests run on PRs — real optimization/bootstrap/parsing/annotation, the SLiM ground-truth comparison, and polyDFE tool-comparison against cached polyDFE results (tier 2)
    slow: the most expensive tests, nightly only — e.g. live polyDFE-binary runs, h-grid inference, large-data EST-SFS/recovery comparisons, high-precision discretization (tier 3)
    serial
