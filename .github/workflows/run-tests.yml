# Run the fast (unit) test suite with coverage on every push to master.
# The unit tier is the pytest.ini default marker filter (-m "not inference and not slow");
# the inference/slow tiers depend on local resources (genomes, SLiM, polyDFE) and are run
# locally, not on CI. Dependencies are installed with uv (no conda).

name: Run tests

on:
  push:
    branches: [master]
    paths-ignore: ['docs/**', '**.md', '**.rst']

permissions:
  contents: read

jobs:
  test:
    name: run tests on ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install fastdfe + test deps
        run: uv pip install --system -e ".[vcf]" pytest pytest-xdist pytest-sugar dadi
      - name: Run tests
        run: pytest -n auto testing/
