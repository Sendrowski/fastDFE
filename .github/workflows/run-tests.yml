# Tiered test suite (see pytest.ini for the marker definitions):
#   push          -> unit  tier  (fast, deterministic; target < 1 min)
#   pull_request  -> unit + inference  (real optimization, bounded)
#   schedule/manual -> everything, including slow (SLiM/polyDFE/h-grid validation)

name: tests # Run tests on Linux

on:
  push:
    paths-ignore:
      - 'docs/**'
  pull_request:
  schedule:
    - cron: "0 3 * * *"  # nightly full suite
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: run tests on linux
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v3
      - uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: "latest"
          python-version: "3.10"
          environment-file: snakemake/envs/testing.yaml
          auto-activate-base: false
          activate-environment: testing-fastdfe
      - name: Select test tier from the triggering event
        id: tier
        run: |
          case "${{ github.event_name }}" in
            push)         echo 'args=' >> "$GITHUB_OUTPUT" ;;                     # ini default: unit
            pull_request) echo 'args=-m "not slow"' >> "$GITHUB_OUTPUT" ;;        # unit + inference
            *)            echo 'args=-o addopts=' >> "$GITHUB_OUTPUT" ;;          # everything
          esac
      - name: Run tests
        run: |
          pytest --cov fastdfe --cov-report=xml testing/ ${{ steps.tier.outputs.args }}
      - uses: codecov/codecov-action@v3
